<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --text: rgba(255, 255, 255, 0.92);
        --fog-a: rgba(255, 255, 255, 0.065);
        --fog-b: rgba(255, 255, 255, 0.04);
        --fog-c: rgba(255, 255, 255, 0.03);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        overflow: hidden;
      }

      body {
        position: relative;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      main {
        position: relative;
        z-index: 2;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(2rem, 7vw, 5rem);
        font-weight: 400;
      }

      .fog {
        position: absolute;
        inset: -30%;
        background-repeat: repeat;
        filter: blur(48px);
        opacity: 0.9;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .fog--one {
        background-image:
          radial-gradient(circle at 20% 30%, var(--fog-a) 0, transparent 28%),
          radial-gradient(circle at 80% 35%, var(--fog-b) 0, transparent 26%),
          radial-gradient(circle at 55% 70%, var(--fog-a) 0, transparent 30%);
        animation: drift-one 42s ease-in-out infinite alternate;
      }

      .fog--two {
        background-image:
          radial-gradient(circle at 30% 75%, var(--fog-b) 0, transparent 24%),
          radial-gradient(circle at 70% 20%, var(--fog-c) 0, transparent 32%),
          radial-gradient(circle at 50% 50%, var(--fog-a) 0, transparent 26%);
        animation: drift-two 55s ease-in-out infinite alternate;
      }

      .fog--three {
        background-image:
          radial-gradient(circle at 15% 55%, var(--fog-c) 0, transparent 30%),
          radial-gradient(circle at 65% 80%, var(--fog-b) 0, transparent 24%),
          radial-gradient(circle at 88% 45%, var(--fog-c) 0, transparent 22%);
        animation: drift-three 65s ease-in-out infinite alternate;
      }

      @keyframes drift-one {
        from {
          transform: translate3d(-3%, -2%, 0) scale(1.08);
        }
        to {
          transform: translate3d(4%, 3%, 0) scale(1.14);
        }
      }

      @keyframes drift-two {
        from {
          transform: translate3d(3%, -4%, 0) scale(1.12);
        }
        to {
          transform: translate3d(-4%, 4%, 0) scale(1.18);
        }
      }

      @keyframes drift-three {
        from {
          transform: translate3d(-2%, 4%, 0) scale(1.1);
        }
        to {
          transform: translate3d(5%, -3%, 0) scale(1.16);
        }
      }
    </style>
  </head>
  <body>
    <div class="fog fog--one" aria-hidden="true"></div>
    <div class="fog fog--two" aria-hidden="true"></div>
    <div class="fog fog--three" aria-hidden="true"></div>

    <main>
      <h1>Coming Soon</h1>
    </main>
  </body>
</html>
