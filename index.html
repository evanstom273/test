<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #121212;
    }

    /* Scrolling background layer */
    .bg {
      position: fixed;
      inset: -200px;
      background-color: #121212;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px, 30px 30px;
      background-position: 0 0, 15px 15px;
      animation: drift 30s linear infinite;
      will-change: transform;
    }

    @keyframes drift {
      0%   { transform: translate(0px, 0px); }
      25%  { transform: translate(-60px, -40px); }
      50%  { transform: translate(-120px, 0px); }
      75%  { transform: translate(-60px, 40px); }
      100% { transform: translate(0px, 0px); }
    }

    /* Soft glow layer that drifts separately */
    .glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(80, 40, 160, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(20, 80, 160, 0.2) 0%, transparent 70%);
      animation: glowDrift 20s ease-in-out infinite alternate;
    }

    @keyframes glowDrift {
      0%   { opacity: 0.6; transform: translate(0, 0) scale(1); }
      50%  { opacity: 1;   transform: translate(30px, -20px) scale(1.05); }
      100% { opacity: 0.6; transform: translate(-20px, 30px) scale(0.97); }
    }

    /* Center content */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    h1 {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 0 40px rgba(160, 120, 255, 0.6),
        0 0 80px rgba(100, 80, 200, 0.3),
        0 2px 4px rgba(0,0,0,0.8);
      animation: pulse 4s ease-in-out infinite;
      line-height: 1.1;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 40px rgba(160,120,255,0.6), 0 0 80px rgba(100,80,200,0.3), 0 2px 4px rgba(0,0,0,0.8); }
      50%       { text-shadow: 0 0 60px rgba(160,120,255,0.9), 0 0 120px rgba(100,80,200,0.5), 0 2px 4px rgba(0,0,0,0.8); }
    }

    .divider {
      width: clamp(80px, 20vw, 200px);
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(180,140,255,0.8), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.4; transform: scaleX(0.8); }
      50%       { opacity: 1;   transform: scaleX(1.1); }
    }

    .subtitle {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: clamp(0.75rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow"></div>

  <div class="stage">
    <h1>Coming Soon</h1>
    <div class="divider"></div>
    <p class="subtitle">Something great is on its way</p>
  </div>
</body>
</html>
