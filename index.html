<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #121212;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: scroll-bg 12s linear infinite;
    }

    @keyframes scroll-bg {
      0%   { background-position: 0px 0px; }
      100% { background-position: 60px 60px; }
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .glow-orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: #7c3aed;
      top: -100px;
      left: -100px;
      animation-duration: 20s;
    }

    .glow-orb:nth-child(2) {
      width: 400px;
      height: 400px;
      background: #2563eb;
      bottom: -80px;
      right: -80px;
      animation-duration: 16s;
      animation-direction: alternate-reverse;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(80px, 60px); }
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    h1 {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: clamp(2.5rem, 10vw, 7rem);
      font-weight: 800;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 0 40px rgba(255,255,255,0.15),
        0 0 80px rgba(124,58,237,0.2);
      animation: pulse-text 4s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 1; text-shadow: 0 0 40px rgba(255,255,255,0.15), 0 0 80px rgba(124,58,237,0.2); }
      50%       { opacity: 0.85; text-shadow: 0 0 60px rgba(255,255,255,0.25), 0 0 120px rgba(124,58,237,0.35); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="content">
    <h1>Coming Soon</h1>
  </div>
</body>
</html>
